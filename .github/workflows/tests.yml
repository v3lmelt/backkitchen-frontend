name: Frontend Tests

on:
  pull_request:
  push:
    branches:
      - dev
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Check changelog generation
        run: npm run changelog:check
      - name: Run tests
        run: npm run test
      - name: Build app
        run: npm run build
