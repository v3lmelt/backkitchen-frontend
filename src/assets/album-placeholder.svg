<svg xmlns="http://www.w3.org/2000/svg" width="400" height="128" viewBox="0 0 400 128">
  <rect width="400" height="128" fill="#1A1A1A"/>
  <!-- subtle grid lines -->
  <line x1="0" y1="32" x2="400" y2="32" stroke="#2E2E2E" stroke-width="1"/>
  <line x1="0" y1="64" x2="400" y2="64" stroke="#2E2E2E" stroke-width="1"/>
  <line x1="0" y1="96" x2="400" y2="96" stroke="#2E2E2E" stroke-width="1"/>
  <line x1="100" y1="0" x2="100" y2="128" stroke="#2E2E2E" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="128" stroke="#2E2E2E" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="128" stroke="#2E2E2E" stroke-width="1"/>
  <!-- vinyl disc -->
  <circle cx="200" cy="64" r="44" fill="#111111" stroke="#2E2E2E" stroke-width="1"/>
  <circle cx="200" cy="64" r="30" fill="#1A1A1A" stroke="#2E2E2E" stroke-width="1"/>
  <circle cx="200" cy="64" r="18" fill="#111111" stroke="#2E2E2E" stroke-width="1"/>
  <circle cx="200" cy="64" r="6" fill="#FF8400"/>
  <!-- label ring highlight -->
  <circle cx="200" cy="64" r="18" fill="none" stroke="#FF840033" stroke-width="1"/>
</svg>
