<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#1A1A1A"/>
  <!-- vinyl disc -->
  <circle cx="100" cy="100" r="80" fill="#111111" stroke="#2E2E2E" stroke-width="1"/>
  <!-- grooves -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="#222222" stroke-width="0.5"/>
  <circle cx="100" cy="100" r="60" fill="none" stroke="#222222" stroke-width="0.5"/>
  <circle cx="100" cy="100" r="50" fill="none" stroke="#222222" stroke-width="0.5"/>
  <!-- label area -->
  <circle cx="100" cy="100" r="28" fill="#1A1A1A" stroke="#2E2E2E" stroke-width="1"/>
  <circle cx="100" cy="100" r="18" fill="#111111" stroke="#2E2E2E" stroke-width="1"/>
  <!-- spindle hole -->
  <circle cx="100" cy="100" r="5" fill="#FF8400"/>
  <!-- label ring highlight -->
  <circle cx="100" cy="100" r="18" fill="none" stroke="#FF840033" stroke-width="1"/>
</svg>
